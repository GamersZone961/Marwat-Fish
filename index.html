<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marwat Fish - Fresh & Frozen Fish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #005F73;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2.2rem;
        }
        .subtitle {
            margin: 5px 0 0;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        .top-call-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ee6c4d;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .container {
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 15px;
        }
        .fish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .fish-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .fish-card:hover {
            transform: translateY(-5px);
        }
        .fish-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .fish-info {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .fish-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #005F73;
            margin: 0 0 10px;
        }
        .fish-price {
            font-size: 1.1rem;
            color: #ee6c4d;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .order-btn {
            margin-top: auto;
            background-color: #25D366;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }
        .order-btn:hover {
            background-color: #20ba5a;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Marwat Fish</h1>
        <p class="subtitle">Fresh & Frozen Fish Available Daily</p>
        <a href="tel:03082325964" class="top-call-btn">📞 Call Now</a>
    </header>

    <div class="container">
        <div class="fish-grid">

            <!-- Dohtar Fish Card -->
            <div class="fish-card">
                <img src="Dhotar.jpg" alt="Dohtar Fish">
                <div class="fish-info">
                    <div class="fish-name">Dohtar Fish</div>
                    <div class="fish-price">Rs. 1,200 / kg</div>
                    <a href="https://wa.me/923082325964?text=I%20want%20to%20order%20Dohtar%20fish" class="order-btn" target="_blank">Order on WhatsApp</a>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Marwat Fish. All Rights Reserved.</p>
    </footer>

</body>
</html>
